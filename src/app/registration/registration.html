<h2>Register</h2>

<form >
    <div>
        <label for="username">Name</label>
        <input type="text" id="username" name="username" required #nameInput />
    </div>

    <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password"/>
    </div>
</form>

<button type="button" (click)="onRegister(nameInput.value)">Register</button>  

<p>
    Already have an account?
    <a routerLink="/login">Login</a>
</p>
